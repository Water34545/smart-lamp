name: Build Firmware

on:
  push:
    branches:
      - main

paths-ignore:
  - 'build/**'

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Copy firmware.bin
        run: |
          mkdir -p build
          cp .pio/build/esp32-c3-devkitm-1/firmware.bin build/firmware.bin

      - name: Commit firmware.bin
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add build/firmware.bin

          git diff --cached --quiet || git commit -m "Auto-build firmware.bin"

          git push